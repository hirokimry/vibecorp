name: AI Review

# vibecorp が配布する claude-code-action AI レビューワークフロー
# Source of Truth: docs/ai-review-auth.md（認証経路）, docs/ai-review-dependency.md（並走運用）

on:
  pull_request:
    # draft 状態ではレビュー不要、コスト節約のため ready_for_review でも走らせる
    types: [opened, synchronize, ready_for_review]

# CISO 要件 (#464): 最小権限。contents は読取のみ、レビューコメント書き込みのため pull-requests / issues は write
# id-token: write は claude-code-action@v1 が GitHub OIDC token を介して GitHub App identity を証明するために必須
# （Claude API 認証用の CLAUDE_CODE_OAUTH_TOKEN とは別系統、Issue #505 で例外承認済み）
permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  claude-review:
    name: Claude Code Action AI レビュー
    runs-on: ubuntu-latest
    # CISO 要件 (#464): Fork PR では secrets にアクセスできないため実行しない
    # draft 状態では走らせない（synchronize イベントは types フィルタを越えて draft でも発火するため明示除外）
    if: github.event.pull_request.head.repo.full_name == github.repository && !github.event.pull_request.draft
    # #466 確定 4: タイムアウト 10 分（中規模 PR 完走、超過時はワークフロー失敗）
    timeout-minutes: 10
    steps:
      # Issue #509: claude-code-action 起動前に CLAUDE_CODE_OAUTH_TOKEN の値が空でないことを確認する。
      # 空の場合は claude-code-action 内部で「Either ANTHROPIC_API_KEY or CLAUDE_CODE_OAUTH_TOKEN is required」
      # の validation エラー (exit 1) で死亡し、required check 未登録のため auto-merge を妨げず
      # レビュー pipeline が静かに死ぬ問題が PR #508 のログで発覚した（"claude_code_oauth_token": ""）。
      # 本ステップは workdir が空 (checkout 前) なので gh は --repo $REPO で明示する必要がある。
      - name: claude-code-action 起動前 preflight ガード
        env:
          OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          if [[ -z "${OAUTH_TOKEN}" ]]; then
            # 同種の警告コメントが既にある場合は重複投稿しない（synchronize イベントの push ごと重複防止）
            existing=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json comments \
              --jq '[.comments[] | select(.body | startswith("⚠️ AI レビュー（claude-code-action）が起動できません"))] | length')
            if [[ "${existing:-0}" -eq 0 ]]; then
              gh pr comment "$PR_NUMBER" --repo "$REPO" \
                --body "⚠️ AI レビュー（claude-code-action）が起動できません。リポジトリ secret \`CLAUDE_CODE_OAUTH_TOKEN\` が未設定または空です。\`claude setup-token\` でトークンを取得し、\`gh secret set CLAUDE_CODE_OAUTH_TOKEN --repo ${REPO}\` で登録してください。詳細は \`docs/ai-review-auth.md\` を参照。"
            fi
            echo "❌ CLAUDE_CODE_OAUTH_TOKEN が未設定または空のため claude-code-action 起動を中止します" >&2
            exit 1
          fi
          echo "✅ CLAUDE_CODE_OAUTH_TOKEN preflight 通過"

      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: REVIEW.md をプロンプトに読み込む
        id: review_prompt
        run: |
          # heredoc delimiter は実行毎に一意なランダム値にする（REVIEW.md 本文に同名行が含まれる事故対策）
          delimiter="EOF_REVIEW_MD_$(date +%s)_${RANDOM}"
          if [[ -f REVIEW.md ]]; then
            {
              echo "prompt<<${delimiter}"
              cat REVIEW.md
              echo "${delimiter}"
            } >> "$GITHUB_OUTPUT"
          else
            echo "prompt=" >> "$GITHUB_OUTPUT"
          fi

      - name: Claude Code Action 実行
        # #466 確定: claude-code-action のインクリメンタルレビュー + auto-resolve 機能を活用
        # - claude-action 自身のコメントのみ dismiss（CodeRabbit / 人間のコメントは触らない）
        # - 修正済み判定したコメントだけ dismiss（push 時の一括 dismiss はしない）
        # - 前回レビュー以降の差分のみインクリメンタルレビュー（コスト節約）
        # - 失敗時のリトライなし（1 回失敗でワークフロー失敗、利用者は再 push or 手動再実行）
        # Issue #521: REVIEW.md の Step 5-7（コメント投稿 / approve 発行）に必要なツールを
        # --allowedTools で明示的に許可する。許可がないと Claude が tool 呼び出しできず
        # 「num_turns: 1, No buffered inline comments」でサイレント終了する。
        # Issue #523: REVIEW.md の Step 1-7 で gh pr diff / view / review 等を実行するため、
        # PR_NUMBER と GITHUB_REPOSITORY を env で Claude プロセスに引き継ぐ。
        # 渡さないと Claude が `gh pr diff "$PR_NUMBER"` を実行する時に変数が空となり、
        # 「num_turns: 1, No buffered inline comments」でサイレント終了する。
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ steps.review_prompt.outputs.prompt }}
          # 許可ツール: REVIEW.md の各 Step 実行に必要なものに限定（CISO #464 最小権限原則）
          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Bash(gh pr review:*),Bash(gh api:*),Read,Glob,Grep"
