name: AI Review

# vibecorp が配布する claude-code-action AI レビューワークフロー
# Source of Truth: docs/ai-review-auth.md（認証経路）, docs/ai-review-dependency.md（並走運用）

on:
  pull_request:
    # draft 状態ではレビュー不要、コスト節約のため ready_for_review でも走らせる
    types: [opened, synchronize, ready_for_review]

# CISO 要件 (#464): 最小権限。contents は読取のみ、レビューコメント書き込みのため pull-requests / issues は write
# id-token: write は claude-code-action@v1 が GitHub OIDC token を介して GitHub App identity を証明するために必須
# （Claude API 認証用の CLAUDE_CODE_OAUTH_TOKEN とは別系統、Issue #505 で例外承認済み）
permissions:
  contents: read
  pull-requests: write
  issues: write
  id-token: write

concurrency:
  group: ai-review-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  intent-label-check:
    name: intent ラベル数チェック
    runs-on: ubuntu-latest
    # CISO 要件 (#464): Fork PR では secrets にアクセスできないため実行しない
    # draft 状態では走らせない（synchronize イベントは types フィルタを越えて draft でも発火するため明示除外）
    if: github.event.pull_request.head.repo.full_name == github.repository && !github.event.pull_request.draft
    steps:
      # Issue #517: 数チェック前に Issue から intent ラベルを継承する。
      # 旧設計では pr-intent-inherit.yml が別 workflow として並列起動していたが、
      # 別 workflow 間は needs で連携できず、継承前のラベル状態で数チェックが走り
      # 必ず初回 fail する競合状態が発生していた（CEO 報告「致命的」）。
      # 同 workflow 内ステップとして移植することで確実に直列化される。
      - name: 対応 Issue から intent ラベルを継承
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # PR 本文から Issue 番号を抽出
          # 対応キーワード: close / closes / closed / fix / fixes / fixed / resolve / resolves / resolved / ref / refs（大小文字区別なし）
          body=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json body --jq '.body')

          # 「キーワード #数字」と「キーワード URL/issues/数字」の両方をマッチ
          # ref / refs 両対応（/vibecorp:pr の --ref オプション運用と整合）
          issue_numbers=$(echo "$body" | grep -oiE '(close[sd]?|fix(es|ed)?|resolve[sd]?|refs?)[[:space:]]+#[0-9]+|(close[sd]?|fix(es|ed)?|resolve[sd]?|refs?)[[:space:]]+https?://[^[:space:]]+/issues/[0-9]+' \
            | grep -oE '[0-9]+$' \
            | sort -u || true)

          if [[ -z "$issue_numbers" ]]; then
            echo "対応 Issue が PR 本文から検出できませんでした（キーワード不在）。継承スキップ。"
            echo "別ジョブの pr-issue-link-check が PR 本文の Issue 参照必須化を担当します。"
            exit 0
          fi

          # 各 Issue から intent/* ラベルを取得
          allowed='["intent/feature","intent/bugfix","intent/performance","intent/security","intent/refactor","intent/infra","intent/docs"]'
          inherited=""
          missing_intent_issues=""
          for issue_num in $issue_numbers; do
            issue_intents=$(gh api "repos/${REPO}/issues/${issue_num}/labels" \
              | jq --argjson allowed "$allowed" -r '[.[] | .name | select(IN($allowed[]))][]' || true)
            if [[ -z "$issue_intents" ]]; then
              missing_intent_issues="${missing_intent_issues} #${issue_num}"
              continue
            fi
            for intent in $issue_intents; do
              # 重複排除のため改行区切りで蓄積
              inherited="${inherited}${intent}"$'\n'
            done
          done

          # 重複排除して PR にラベル追加（ホワイトリスト 7 種のみ）
          unique_intents=$(echo -n "$inherited" | sort -u)
          if [[ -z "$unique_intents" ]]; then
            if [[ -n "$missing_intent_issues" ]]; then
              # 同じ警告コメントが既に投稿されていればスキップ（synchronize イベントの push ごと重複防止）
              existing_warning=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json comments --jq '[.comments[] | select(.body | startswith("⚠️ 対応 Issue"))] | length')
              if [[ "${existing_warning:-0}" -eq 0 ]]; then
                gh pr comment "$PR_NUMBER" --repo "$REPO" \
                  --body "⚠️ 対応 Issue（${missing_intent_issues}）に intent/* ラベルが付与されていません。Issue 側で intent ラベルを 1 つ付与してから PR を再 push してください。詳細は \`.claude/rules/intent-labels.md\` を参照。"
              fi
            fi
            echo "Issue 側に intent ラベルがないため継承不可。"
            exit 0
          fi

          # 既に PR に同じ intent ラベルがある場合はスキップ（重複付与防止）
          existing=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/labels" --jq '[.[] | .name | select(startswith("intent/"))] | join("\n")')
          while IFS= read -r intent; do
            [[ -z "$intent" ]] && continue
            if echo "$existing" | grep -qFx -- "$intent"; then
              echo "PR に既に '${intent}' あり、スキップ"
              continue
            fi
            gh pr edit "$PR_NUMBER" --repo "$REPO" --add-label "$intent"
            echo "PR に '${intent}' を継承付与"
          done <<<"$unique_intents"

      - name: 1 PR 1 intent 厳守チェック
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          # intent/* ラベルの全体数と許可ラベル 7 種のカウントを別々に取得
          # 全体数 != 許可数 → 未知の intent/* (intent/unknown 等) が混在 → fail
          # gh api の --jq は --argjson を受けないため、gh api で生 JSON を取得して jq にパイプ
          allowed='["intent/feature","intent/bugfix","intent/performance","intent/security","intent/refactor","intent/infra","intent/docs"]'
          counts=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/labels" \
            | jq --argjson allowed "$allowed" '{
                total_intent: ([.[] | .name | select(startswith("intent/"))] | length),
                allowed_intent: ([.[] | .name | select(IN($allowed[]))] | length)
              }')
          total_intent=$(jq -r '.total_intent' <<< "$counts")
          allowed_intent=$(jq -r '.allowed_intent' <<< "$counts")
          unknown_intent=$(( total_intent - allowed_intent ))

          if [[ "$unknown_intent" -gt 0 ]]; then
            gh pr comment "$PR_NUMBER" --repo "$REPO" \
              --body "⚠️ 許可されていない intent/* ラベルが含まれています。1 PR 1 intent ルールに従い、許可 7 種（intent/feature, intent/bugfix, intent/performance, intent/security, intent/refactor, intent/infra, intent/docs）から 1 つだけ付与してください。"
            exit 1
          fi
          if [[ "$allowed_intent" -eq 0 ]]; then
            gh pr comment "$PR_NUMBER" --repo "$REPO" \
              --body "⚠️ intent/* ラベルが付与されていません（許可 7 種のうち 1 つを付ける必要があります）。1 PR 1 intent ルール（intent/feature, intent/bugfix, intent/performance, intent/security, intent/refactor, intent/infra, intent/docs から 1 つ）に従い、ラベルを 1 つ付与してから再 push してください。詳細は .claude/rules/intent-labels.md を参照。"
            exit 1
          fi
          if [[ "$allowed_intent" -gt 1 ]]; then
            gh pr comment "$PR_NUMBER" --repo "$REPO" \
              --body "⚠️ 複数の intent ラベル（許可 7 種のうち）が付与されています。1 PR 1 intent ルールに従い、ラベルを 1 つに修正してから再 push してください。"
            exit 1
          fi

  claude-review:
    name: Claude Code Action AI レビュー
    needs: intent-label-check
    runs-on: ubuntu-latest
    # CISO 要件 (#464): Fork PR では secrets にアクセスできないため実行しない
    # draft 状態では走らせない（synchronize イベントは types フィルタを越えて draft でも発火するため明示除外）
    if: github.event.pull_request.head.repo.full_name == github.repository && !github.event.pull_request.draft
    # #466 確定 4: タイムアウト 10 分（中規模 PR 完走、超過時はワークフロー失敗）
    timeout-minutes: 10
    steps:
      # Issue #509: claude-code-action 起動前に CLAUDE_CODE_OAUTH_TOKEN の値が空でないことを確認する。
      # 空の場合は claude-code-action 内部で「Either ANTHROPIC_API_KEY or CLAUDE_CODE_OAUTH_TOKEN is required」
      # の validation エラー (exit 1) で死亡し、required check 未登録のため auto-merge を妨げず
      # レビュー pipeline が静かに死ぬ問題が PR #508 のログで発覚した（"claude_code_oauth_token": ""）。
      # 本ステップは workdir が空 (checkout 前) なので gh は --repo $REPO で明示する必要がある。
      - name: claude-code-action 起動前 preflight ガード
        env:
          OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          if [[ -z "${OAUTH_TOKEN}" ]]; then
            # 同種の警告コメントが既にある場合は重複投稿しない（synchronize イベントの push ごと重複防止）
            existing=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json comments \
              --jq '[.comments[] | select(.body | startswith("⚠️ AI レビュー（claude-code-action）が起動できません"))] | length')
            if [[ "${existing:-0}" -eq 0 ]]; then
              gh pr comment "$PR_NUMBER" --repo "$REPO" \
                --body "⚠️ AI レビュー（claude-code-action）が起動できません。リポジトリ secret \`CLAUDE_CODE_OAUTH_TOKEN\` が未設定または空です。\`claude setup-token\` でトークンを取得し、\`gh secret set CLAUDE_CODE_OAUTH_TOKEN --repo ${REPO}\` で登録してください。詳細は \`docs/ai-review-auth.md\` を参照。"
            fi
            echo "❌ CLAUDE_CODE_OAUTH_TOKEN が未設定または空のため claude-code-action 起動を中止します" >&2
            exit 1
          fi
          echo "✅ CLAUDE_CODE_OAUTH_TOKEN preflight 通過"

      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: REVIEW.md をプロンプトに読み込む
        id: review_prompt
        run: |
          # heredoc delimiter は実行毎に一意なランダム値にする（REVIEW.md 本文に同名行が含まれる事故対策）
          delimiter="EOF_REVIEW_MD_$(date +%s)_${RANDOM}"
          if [[ -f REVIEW.md ]]; then
            {
              echo "prompt<<${delimiter}"
              cat REVIEW.md
              echo "${delimiter}"
            } >> "$GITHUB_OUTPUT"
          else
            echo "prompt=" >> "$GITHUB_OUTPUT"
          fi

      - name: Claude Code Action 実行
        # #466 確定: claude-code-action のインクリメンタルレビュー + auto-resolve 機能を活用
        # - claude-action 自身のコメントのみ dismiss（CodeRabbit / 人間のコメントは触らない）
        # - 修正済み判定したコメントだけ dismiss（push 時の一括 dismiss はしない）
        # - 前回レビュー以降の差分のみインクリメンタルレビュー（コスト節約）
        # - 失敗時のリトライなし（1 回失敗でワークフロー失敗、利用者は再 push or 手動再実行）
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: ${{ steps.review_prompt.outputs.prompt }}
          # approve / request_changes 発行は #467 で実装
