# vibecorp.yml — プロジェクト設定
name: vibecorp
preset: full
language: ja
base_branch: main
protected_files:
  - MVV.md
# レビュアーは vibehawk / CodeRabbit を独立トグルで選択する（Issue #531）。
# vibecorp 自身も vibehawk-only 運用に移行済み（Issue #783、配布デフォルトと一致）。
# 切替には npx vibehawk setup + branch protection（vibehawk required・approval 0）が必要。
coderabbit:
  enabled: false
vibehawk:
  enabled: true
  skip_paths:
    - "*.lock"
    - ".git/**"
    - "node_modules/**"
    - "dist/**"
    - "build/**"
    - ".cache/**"
    - "vendor/**"
branch_protection:
  required_approvals: 1
guide_gate:
  extra_paths:
    - templates/claude/
    - install.sh
diagnose:
  enabled: true
  max_issues_per_run: 7
  max_issues_per_day: 14
  max_files_per_issue: 10
  scope: ""
  forbidden_targets:
    - "hooks/*.sh"
    - "vibecorp.yml"
    - "MVV.md"
    - "SECURITY.md"
    - "POLICY.md"
    - "skills/**"
