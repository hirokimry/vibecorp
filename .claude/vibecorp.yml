# vibecorp.yml — プロジェクト設定
name: vibecorp
preset: full
language: ja
base_branch: main
protected_files:
  - MVV.md
claude_action:
  enabled: true
  skip_paths:
    - "*.lock"
    - ".git/**"
    - "node_modules/**"
    - "dist/**"
    - "build/**"
    - ".cache/**"
    - "vendor/**"
guide_gate:
  extra_paths:
    - templates/claude/
    - install.sh
diagnose:
  enabled: true
  max_issues_per_run: 7
  max_issues_per_day: 14
  max_files_per_issue: 10
  scope: ""
  forbidden_targets:
    - "hooks/*.sh"
    - "vibecorp.yml"
    - "MVV.md"
    - "SECURITY.md"
    - "POLICY.md"
