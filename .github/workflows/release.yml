# release.yml — main マージ時にセマンティックリリースを自動実行
# Conventional Commits を解析し、バージョン番号を決定して GitHub Release を作成する
name: release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: git ユーザー設定
        run: .github/scripts/release-configure-git.sh

      - name: リリース判定・実行
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: .github/scripts/release-publish.sh
