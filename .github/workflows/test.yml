name: test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: 全テスト実行
        run: |
          failed=0
          for f in tests/test_*.sh; do
            echo "=== $f ==="
            bash "$f" || failed=1
          done
          exit "$failed"
