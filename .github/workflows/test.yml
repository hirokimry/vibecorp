name: test

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # UTC 17:00 = JST 02:00 nightly — macOS 固有リグレッションを日次で検出
    - cron: '0 17 * * *'
  workflow_dispatch:

concurrency:
  group: test-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  # Ubuntu テスト: schedule 以外（PR / push:main / workflow_dispatch）で実行
  # Issue #340: test_install.sh を 4 シャード + other に分割して matrix 並列実行
  test-ubuntu:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [args, preset, lock, update, other]
    steps:
      - uses: actions/checkout@v4

      - name: jq の確認
        run: jq --version

      - name: bubblewrap の install
        run: sudo apt-get update -q && sudo apt-get install -y bubblewrap

      - name: シャード別テスト実行
        env:
          SHARD: ${{ matrix.shard }}
        run: |
          case "$SHARD" in
            args|preset|lock|update)
              bash "tests/test_install_${SHARD}.sh"
              ;;
            other)
              # 4 新規シャード以外の全 test_*.sh を実行（既存 test_install_claude_real.sh
              # / test_install_isolation.sh / test_install_orphan_hook.sh を含む）
              shopt -s nullglob
              files=(tests/test_*.sh)
              if [ ${#files[@]} -eq 0 ]; then
                echo "テストファイルが見つかりません"
                exit 1
              fi
              failed=0
              for f in "${files[@]}"; do
                base="${f##*/}"
                case "$base" in
                  test_install_args.sh|test_install_preset.sh|test_install_lock.sh|test_install_update.sh)
                    continue
                    ;;
                esac
                echo "=== $f ==="
                bash "$f" || failed=1
              done
              exit "$failed"
              ;;
            *)
              echo "未知の shard 値: $SHARD"
              exit 1
              ;;
          esac

  # macOS テスト: pull_request 以外（push:main / schedule / workflow_dispatch）で実行
  # PR では macOS 分課金（Ubuntu 比 10倍）を回避し、push:main と nightly でリグレッションを捕捉する
  test-macos:
    if: github.event_name != 'pull_request'
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [args, preset, lock, update, other]
    steps:
      - uses: actions/checkout@v4

      - name: jq の確認
        run: jq --version

      - name: シャード別テスト実行
        env:
          SHARD: ${{ matrix.shard }}
        run: |
          case "$SHARD" in
            args|preset|lock|update)
              bash "tests/test_install_${SHARD}.sh"
              ;;
            other)
              shopt -s nullglob
              files=(tests/test_*.sh)
              if [ ${#files[@]} -eq 0 ]; then
                echo "テストファイルが見つかりません"
                exit 1
              fi
              failed=0
              for f in "${files[@]}"; do
                base="${f##*/}"
                case "$base" in
                  test_install_args.sh|test_install_preset.sh|test_install_lock.sh|test_install_update.sh)
                    continue
                    ;;
                esac
                echo "=== $f ==="
                bash "$f" || failed=1
              done
              exit "$failed"
              ;;
            *)
              echo "未知の shard 値: $SHARD"
              exit 1
              ;;
          esac

  # 集約ジョブ: Branch Protection の required check として機能する
  #
  # 結果の扱い（実装と一致）:
  #   - success: 通常完了（pass）
  #   - skipped: event 条件で matrix が未実行（pass。例: PR では macOS が skip される）
  #   - cancelled: 異常終了として **fail** 扱い（exit 1）
  #     * 補足: `concurrency.cancel-in-progress: true` で前 run が cancel された場合は、
  #       後続 run が新たに評価されるため required check 上は問題にならない
  #       （required check は最新 run の結論を見る）。本ジョブは「現在 run 内の親ジョブが
  #       cancelled になったら fail」とだけ判定すれば良く、cancel 経路の区別は不要
  #   - failure / その他: fail（exit 1）
  #
  # matrix 展開後は親 job の result が全シャードの成功で初めて success になる
  test:
    needs: [test-ubuntu, test-macos]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 全ジョブの結果を確認
        run: |
          ubuntu_result="${{ needs.test-ubuntu.result }}"
          macos_result="${{ needs.test-macos.result }}"
          echo "test-ubuntu: $ubuntu_result"
          echo "test-macos: $macos_result"
          for r in "$ubuntu_result" "$macos_result"; do
            case "$r" in
              success|skipped)
                # success: 全シャードが pass / skipped: event 条件で未実行 → 集約は pass
                ;;
              cancelled)
                # cancel-in-progress 由来の cancel は新 run に置き換わるため
                # required check 上は問題にならない。それ以外で cancelled に
                # なるのは異常終了として扱う。
                echo "ジョブがキャンセルされました（cancel-in-progress 由来でない場合は異常終了として fail 扱いします）"
                exit 1
                ;;
              *)
                echo "ジョブが失敗しました（result=${r}）"
                exit 1
                ;;
            esac
          done
          exit 0
