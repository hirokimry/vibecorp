name: test

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # UTC 17:00 = JST 02:00 nightly — macOS 固有リグレッションを日次で検出
    - cron: '0 17 * * *'
  workflow_dispatch:

concurrency:
  group: test-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  # Ubuntu テスト: schedule 以外（PR / push:main / workflow_dispatch）で実行
  test-ubuntu:
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: jq の確認
        run: jq --version

      - name: 全テスト実行
        run: |
          shopt -s nullglob
          files=(tests/test_*.sh)
          if [ ${#files[@]} -eq 0 ]; then
            echo "テストファイルが見つかりません"
            exit 1
          fi
          failed=0
          for f in "${files[@]}"; do
            echo "=== $f ==="
            bash "$f" || failed=1
          done
          exit "$failed"

  # macOS テスト: pull_request 以外（push:main / schedule / workflow_dispatch）で実行
  # PR では macOS 分課金（Ubuntu 比 10倍）を回避し、push:main と nightly でリグレッションを捕捉する
  test-macos:
    if: github.event_name != 'pull_request'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: jq の確認
        run: jq --version

      - name: 全テスト実行
        run: |
          shopt -s nullglob
          files=(tests/test_*.sh)
          if [ ${#files[@]} -eq 0 ]; then
            echo "テストファイルが見つかりません"
            exit 1
          fi
          failed=0
          for f in "${files[@]}"; do
            echo "=== $f ==="
            bash "$f" || failed=1
          done
          exit "$failed"

  # 集約ジョブ: Branch Protection の required check として機能する
  # skipped（event 条件で未実行）は成功扱い、failure / cancelled は不合格
  test:
    needs: [test-ubuntu, test-macos]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: 全ジョブの結果を確認
        run: |
          ubuntu_result="${{ needs.test-ubuntu.result }}"
          macos_result="${{ needs.test-macos.result }}"
          echo "test-ubuntu: $ubuntu_result"
          echo "test-macos: $macos_result"
          for r in "$ubuntu_result" "$macos_result"; do
            case "$r" in
              success|skipped) ;;
              cancelled)
                echo "ジョブがキャンセルされました"
                exit 1
                ;;
              *)
                echo "ジョブが失敗しました"
                exit 1
                ;;
            esac
          done
          exit 0
